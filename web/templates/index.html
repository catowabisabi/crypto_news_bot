<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0B0E11">
<title>Crypto News Telegram Bot</title>
<style>
  :root{
    --bg:#0B0E11;
    --panel:#12161B;
    --card:#161B21;
    --line:#232A32;
    --text:#E8ECEF;
    --sub:#8A94A0;
    --bull:#00D964;
    --bear:#FF5A4E;
    --gold:#F5B700;
    --mono: 'JetBrains Mono', 'Courier New', monospace;
    --sans: 'Inter', -apple-system, 'PingFang TC', sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:#000; color:var(--text); font-family:var(--sans);
    min-height:100vh; padding:0;
  }

  /* ===== DESKTOP WRAPPER ===== */
  .desktop-wrapper{
    display:flex; justify-content:center; min-height:100vh;
    background:var(--bg);
  }

  /* ===== MOBILE PHONE FRAME ===== */
  .phone{
    width:390px; min-height:100vh; background:var(--bg);
    border-left:1px solid var(--line); border-right:1px solid var(--line);
    display:flex; flex-direction:column;
    position:relative;
  }

  /* ===== DESKTOP LAYOUT ===== */
  @media (min-width:768px){
    .phone{
      width:100%; max-width:900px; min-height:100vh;
      border:none; flex-direction:column;
    }
    .desktop-wrapper{ align-items:flex-start; }
    .desktop-container{
      display:flex; gap:0; width:100%; max-width:900px;
      min-height:100vh;
    }
    .desktop-sidebar{
      width:240px; flex-shrink:0; border-right:1px solid var(--line);
      background:var(--panel);
    }
    .desktop-main{ flex:1; display:flex; flex-direction:column; }
    /* Pin top/bottom on desktop too */
    .navbar{ position:sticky; top:0; z-index:50; }
    .bottom-nav-custom{ position:sticky; bottom:0; z-index:50; }
  }

  /* ===== 頂部導航 ===== */
  .navbar{
    padding:14px 16px 10px; background:var(--panel);
    border-bottom:1px solid var(--line);
    position:sticky; top:0; z-index:50;
  }
  .navbar-top{
    display:flex; align-items:center; justify-content:space-between;
  }
  .logo{
    display:flex; align-items:center; gap:8px;
    font-family:var(--mono); font-weight:700; font-size:17px; letter-spacing:.5px;
  }
  .logo-mark{
    width:22px; height:22px; border-radius:5px;
    background:linear-gradient(135deg, var(--gold), #B8860B);
    display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:900; color:#0B0E11;
  }
  .navbar-actions{ display:flex; gap:14px; color:var(--sub); font-size:16px; cursor:pointer; }
  .navbar-actions span:hover{ color:var(--text); }

  /* 狀態面板：終端機風格單行 */
  #status-panel{
    margin-top:12px; padding:8px 10px; background:var(--bg);
    border:1px solid var(--line); border-radius:8px;
    display:flex; align-items:center; justify-content:space-between;
    font-family:var(--mono); font-size:11px; color:var(--sub);
  }
  #status-panel .dot{
    width:6px; height:6px; border-radius:50%; background:var(--bull);
    display:inline-block; margin-right:5px; box-shadow:0 0 6px var(--bull);
  }
  #status-panel .dot.off{ background:var(--sub); box-shadow:none; }
  #status-panel .seg{ display:flex; align-items:center; }
  #status-panel .bot-on{ color:var(--bull); }

  /* 情緒滾動條 ticker */
  .ticker-strip{
    overflow:hidden; white-space:nowrap; background:var(--bg);
    border-bottom:1px solid var(--line); padding:6px 0;
  }
  .ticker-strip .track{
    display:inline-block; animation:scroll 22s linear infinite;
    font-family:var(--mono); font-size:11px;
  }
  .ticker-strip span{ margin-right:22px; }
  .up{ color:var(--bull); } .down{ color:var(--bear); }
  @keyframes scroll{ 0%{transform:translateX(0);} 100%{transform:translateX(-50%);} }

  /* ===== 分頁導航 ===== */
  .nav-tabs-custom{
    display:flex; gap:6px; padding:10px 16px; background:var(--panel);
    border-bottom:1px solid var(--line);
  }
  .nav-tabs-custom .tab{
    flex:1; text-align:center; padding:8px 0; font-size:13px;
    border-radius:7px; color:var(--sub); font-weight:600;
    border:1px solid transparent; cursor:pointer; background:none;
  }
  .nav-tabs-custom .tab.active{
    background:rgba(245,183,0,.12); color:var(--gold); border-color:rgba(245,183,0,.35);
  }

  /* ===== 新聞列表 ===== */
  #news-list{ flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:10px; }

  #news-list:empty{
    display:flex; align-items:center; justify-content:center;
    min-height:200px;
  }
  #news-list:empty::after{
    content:'暫時沒有新聞'; color:var(--sub); font-size:14px;
  }

  .news-card{
    background:var(--card); border:1px solid var(--line); border-radius:10px;
    padding:12px 14px 12px 12px; position:relative; overflow:hidden; cursor:pointer;
  }
  .news-card::before{
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
  }
  .news-card.positive::before{ background:var(--bull); }
  .news-card.negative::before{ background:var(--bear); }
  .news-card.neutral::before{ background:var(--sub); }

  .news-card-header{
    display:flex; justify-content:space-between; align-items:center;
    font-family:var(--mono); font-size:10.5px; color:var(--sub); margin-bottom:6px;
  }
  .news-card-header .source{ color:var(--gold); font-weight:700; }
  .news-title{ font-size:14.5px; font-weight:700; line-height:1.4; margin-bottom:4px; }
  .news-summary{ font-size:12.5px; color:var(--sub); line-height:1.5; margin-bottom:10px;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

  .news-footer{ display:flex; justify-content:space-between; align-items:center; }

  .sentiment-badge{
    font-family:var(--mono); font-size:11px; font-weight:700; padding:3px 9px;
    border-radius:5px; letter-spacing:.3px;
  }
  .sentiment-badge.positive{ background:rgba(0,217,100,.12); color:var(--bull); }
  .sentiment-badge.negative{ background:rgba(255,90,78,.12); color:var(--bear); }
  .sentiment-badge.neutral{ background:rgba(138,148,160,.15); color:var(--sub); }

  .card-actions .action-btn{
    background:none; border:none; color:var(--sub); font-size:16px; cursor:pointer;
    padding:0;
  }
  .card-actions .action-btn.active{ color:var(--gold); }

  /* ===== 底部導航 ===== */
  .bottom-nav-custom{
    display:flex; background:var(--panel); border-top:1px solid var(--line);
    padding:10px 0 18px;
    position:sticky; bottom:0; z-index:50;
  }
  .nav-btn{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
    color:var(--sub); font-size:10.5px; cursor:pointer; background:none; border:none;
  }
  .nav-btn.active{ color:var(--gold); }
  .nav-btn .icon{ font-size:18px; }

  /* ===== Desktop Sidebar ===== */
  @media (min-width:768px){
    .desktop-sidebar-inner{ padding:16px; }
    .sidebar-logo{
      display:flex; align-items:center; gap:10px;
      font-family:var(--mono); font-weight:700; font-size:15px;
      padding-bottom:16px; border-bottom:1px solid var(--line); margin-bottom:16px;
    }
    .sidebar-logo .logo-mark{
      width:28px; height:28px; border-radius:6px;
      background:linear-gradient(135deg, var(--gold), #B8860B);
      display:flex; align-items:center; justify-content:center;
      font-size:14px; font-weight:900; color:#0B0E11;
    }
    .sidebar-status{
      padding:12px; background:var(--bg); border:1px solid var(--line);
      border-radius:8px; font-family:var(--mono); font-size:11px; margin-bottom:16px;
    }
    .sidebar-status .row{ display:flex; justify-content:space-between; margin-bottom:6px; }
    .sidebar-status .row:last-child{ margin-bottom:0; }
    .sidebar-status .label{ color:var(--sub); }
    .sidebar-status .val{ color:var(--text); }
    .sidebar-status .val.green{ color:var(--bull); }
    .sidebar-status .val.red{ color:var(--bear); }
    .sidebar-nav{ display:flex; flex-direction:column; gap:4px; }
    .sidebar-nav .snav{
      display:flex; align-items:center; gap:10px; padding:10px 12px;
      border-radius:8px; color:var(--sub); font-size:13px; cursor:pointer;
    }
    .sidebar-nav .snav:hover{ background:var(--card); color:var(--text); }
    .sidebar-nav .snav.active{ background:rgba(245,183,0,.12); color:var(--gold); }
    .sidebar-nav .snav .sicon{ font-size:16px; }
    .desktop-news-area{ flex:1; display:flex; flex-direction:column; }
    .desktop-news-header{
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 16px; background:var(--panel); border-bottom:1px solid var(--line);
    }
    .desktop-news-header h2{ font-size:15px; font-weight:700; }
    .desktop-news-actions{ display:flex; gap:8px; }
    .desktop-news-actions button{
      background:none; border:1px solid var(--line); border-radius:6px;
      color:var(--sub); padding:6px 12px; font-size:12px; cursor:pointer;
    }
    .desktop-news-actions button:hover{ border-color:var(--gold); color:var(--gold); }
    .desktop-news-actions .btn-refresh:hover{ color:var(--bull); border-color:var(--bull); }
    #desktop-news-list{
      flex:1; padding:16px; display:grid;
      grid-template-columns:repeat(auto-fill, minmax(320px,1fr)); gap:12px;
    }
    #desktop-news-list .news-card{ height:100%; }
    @media (max-width:900px){
      #desktop-news-list{ grid-template-columns:1fr; }
    }
  }

  /* ===== Modal Overlays ===== */
  .modal-overlay{
    display:none; position:fixed; top:0; left:0; right:0; bottom:0;
    background:rgba(0,0,0,.7); z-index:100; align-items:flex-end; justify-content:center;
  }
  .modal-overlay.show{ display:flex; }

  .modal-sheet{
    background:var(--panel); border-top:1px solid var(--line);
    border-radius:16px 16px 0 0; width:390px; max-height:85vh;
    overflow-y:auto; padding:20px 16px 40px;
  }
  .modal-sheet .modal-handle{
    width:36px; height:4px; background:var(--line); border-radius:2px;
    margin:0 auto 16px;
  }
  .modal-sheet h5{ font-size:16px; font-weight:700; margin-bottom:16px; color:var(--text); }

  .modal-field{ margin-bottom:16px; }
  .modal-field label{ display:block; font-size:12px; color:var(--sub); margin-bottom:6px; font-family:var(--mono); }
  .modal-field input, .modal-field select{
    width:100%; background:var(--bg); border:1px solid var(--line); border-radius:8px;
    color:var(--text); padding:10px 12px; font-size:14px; outline:none;
  }
  .modal-field input:focus, .modal-field select:focus{ border-color:var(--gold); }

  .btn-gold{
    width:100%; padding:12px; background:var(--gold); color:#0B0E11;
    border:none; border-radius:8px; font-weight:700; font-size:14px; cursor:pointer;
  }
  .btn-gold:hover{ opacity:.9; }

  .btn-row{ display:flex; gap:10px; margin-top:16px; }
  .btn-row button{ flex:1; padding:10px; border-radius:8px; font-size:13px; cursor:pointer; font-weight:600; }

  /* ===== Toast ===== */
  .toast-msg{
    position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
    background:var(--card); border:1px solid var(--line); border-radius:8px;
    padding:10px 16px; font-size:13px; color:var(--text);
    z-index:200; display:none; white-space:nowrap;
  }
  .toast-msg.show{ display:block; animation:fadeUp .3s; }
  @keyframes fadeUp{ from{opacity:0;transform:translateX(-50%) translateY(10px);} to{opacity:1;transform:translateX(-50%) translateY(0);} }
  .toast-msg.error{ border-color:var(--bear); color:var(--bear); }
  .toast-msg.success{ border-color:var(--bull); color:var(--bull); }

  /* ===== Desktop Modal (centered) ===== */
  @media (min-width:768px){
    .modal-overlay{ align-items:center; }
    .modal-sheet{ border-radius:16px; max-width:600px; width:90%; max-height:80vh; }
  }
</style>
</head>
<body>

<div class="desktop-wrapper">
<div class="desktop-container">

  <!-- ========== MOBILE PHONE FRAME ========== -->
  <div class="phone">

    <nav class="navbar">

      <div class="sidebar-status">
        <div class="row"><span class="label">Chat ID</span><span class="val" id="s-chat-id">—</span></div>

  <!-- ========== DESKTOP MAIN AREA ========== -->
  <div class="desktop-main" id="desktop-main" style="display:none;">

      <div class="desktop-news-actions">
        <button class="btn-refresh" id="dsk-btn-refresh">⟳ 刷新</button>
        <button id="dsk-btn-settings2">⚙ 設定</button>
      </div>
    </div>
    <div id="desktop-news-list"></div>
  </div>

</div>
</div>

<!-- 新聞詳情 Modal -->
<div class="modal-overlay" id="news-modal-overlay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:12px;">
      <div>
        <span id="modal-source" class="source" style="color:var(--gold);font-family:var(--mono);font-size:11px;font-weight:700;"></span>
        <span id="modal-date" style="color:var(--sub);font-family:var(--mono);font-size:11px;margin-left:8px;"></span>
      </div>
      <span style="cursor:pointer;color:var(--sub);font-size:18px;" id="modal-close-btn">×</span>
    </div>
    <h5 id="modal-title" style="margin-bottom:12px;"></h5>
    <div id="modal-body" style="color:var(--sub);font-size:13.5px;line-height:1.6;"></div>
    <div class="btn-row" style="margin-top:20px;">
      <button id="btn-open-link" style="flex:1;padding:10px;border-radius:8px;background:var(--bg);color:var(--gold);border:1px solid var(--gold);font-size:13px;cursor:pointer;">開啟原文</button>

    </div>

</div>

<!-- 設定 Modal -->
<div class="modal-overlay" id="settings-modal-overlay">
  <div class="modal-sheet" style="padding-top:12px;">
    <div class="modal-handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <h5 style="margin:0;">設定</h5>

      <label>Chat ID</label>

<script>
// Auto-detect desktop and show desktop layout
(function(){
  const w = window.innerWidth;
  const isDesktop = w >= 768;
  const phoneEl = document.querySelector('.phone');
  const sidebar = document.getElementById('desktop-sidebar');
  const main = document.getElementById('desktop-main');

  if(isDesktop){
    phoneEl.style.display = 'none';
    sidebar.style.display = 'block';
    main.style.display = 'flex';
    document.getElementById('desktop-news-list').style.display = 'grid';
  }

  window.addEventListener('resize', () => {
    const d = window.innerWidth >= 768;
    if(d){
      phoneEl.style.display = 'none';
      sidebar.style.display = 'block';
      main.style.display = 'flex';
    } else {
      phoneEl.style.display = 'flex';
      sidebar.style.display = 'none';
      main.style.display = 'none';
    }
  });
})();

  const newsModal = document.getElementById('news-modal-overlay');
  const settingsModal = document.getElementById('settings-modal-overlay');
  const toastEl = document.getElementById('toast-msg');
  let toastTimer;

  function showToast(msg, type='success'){
    toastEl.textContent = msg;
    toastEl.className = 'toast-msg show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2500);
  }

  document.getElementById('modal-close-btn').onclick = () => newsModal.classList.remove('show');
  document.getElementById('settings-close-btn').onclick = () => settingsModal.classList.remove('show');
  document.getElementById('btn-settings').onclick = () => { settingsModal.classList.add('show'); loadSettings(); };
  document.getElementById('btn-refresh').onclick = () => { loadNews(); loadStatus(); };
  document.getElementById('dsk-btn-settings').onclick = () => { settingsModal.classList.add('show'); loadSettings(); };
  document.getElementById('dsk-btn-settings2').onclick = () => { settingsModal.classList.add('show'); loadSettings(); };
  document.getElementById('dsk-btn-refresh').onclick = () => { loadNews(); loadStatus(); };

  newsModal.onclick = (e) => { if(e.target === newsModal) newsModal.classList.remove('show'); };
  settingsModal.onclick = (e) => { if(e.target === settingsModal) settingsModal.classList.remove('show'); };

  // Bottom nav
  document.querySelectorAll('.bottom-nav-custom .nav-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.bottom-nav-custom .nav-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const page = btn.dataset.page;
      if(page === 'settings'){ settingsModal.classList.add('show'); loadSettings(); }
      else if(page === 'favorites'){ currentCategory = 'favorites'; loadFavoritesToView(); }
      else { currentCategory = 'all'; loadNews(); }
    };
  });

  // Desktop sidebar nav
  document.querySelectorAll('.sidebar-nav .snav').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.sidebar-nav .snav').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const cat = btn.dataset.category;
      currentCategory = cat;
      const titles = {all:'📋 全部新聞',crypto:'₿ Crypto',stock:'📊 股票',favorites:'★ 收藏'};
      document.getElementById('desktop-title').textContent = titles[cat] || '📋 全部新聞';
      if(cat === 'favorites') loadFavoritesToView();
      else loadNews();
    };
  });

  // Sync status to desktop sidebar
  const origLoadStatus = window.loadStatus;
  window.loadStatus = async function(){
    await origLoadStatus();
    const data = {
      chatId: document.getElementById('status-chat-id').textContent,
      botIsOn: document.getElementById('status-bot-text').textContent.includes('ON'),
      health: document.getElementById('status-health-text').textContent
    };
    document.getElementById('s-chat-id').textContent = data.chatId || '—';
    const botEl = document.getElementById('s-bot');
    botEl.textContent = data.botIsOn ? 'ON' : 'OFF';
    botEl.className = 'val ' + (data.botIsOn ? 'green' : 'red');
    document.getElementById('s-health').textContent = data.health || '—';
  };
</script>
</body>
</html>
