<!DOCTYPE html>
<html lang="zh-TW" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <title>新聞摘要助手</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="app">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark-gradient sticky-top">
            <div class="container-fluid px-3">
                <span class="navbar-brand fw-bold"><i class="bi bi-newspaper me-2"></i>新聞摘要</span>

                <div class="d-flex align-items-center gap-2">
                    <div id="status-panel" class="status-panel d-none d-lg-flex align-items-center gap-3 me-3">
                        <div class="status-item">
                            <span class="status-label">Chat ID</span>
                            <span id="status-chat-id" class="status-value">-</span>
                        </div>
                        <div class="status-divider"></div>
                        <div class="status-item">
                            <span class="status-label">狀態</span>
                            <span id="status-health" class="badge bg-success">Healthy</span>
                        </div>
                        <div class="status-divider"></div>
                        <div class="status-item">
                            <span class="status-label">Bot</span>
                            <span id="status-bot" class="badge bg-secondary">-</span>
                        </div>
                    </div>
                    <button id="btn-refresh" class="btn btn-outline-light btn-sm" title="刷新">
                        <i class="bi bi-arrow-clockwise"></i>
                    </button>
                    <button id="btn-settings" class="btn btn-outline-light btn-sm" title="設定">
                        <i class="bi bi-gear"></i>
                    </button>
                </div>
            </div>
        </nav>

        <ul class="nav nav-tabs-custom nav-pills mb-0 px-3 pt-3 bg-dark">
            <li class="nav-item">
                <button class="nav-link active" data-category="all">
                    <i class="bi bi-collection me-1"></i>全部
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-category="crypto">
                    <i class="bi bi-currency-bitcoin me-1"></i>Crypto
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-category="stock">
                    <i class="bi bi-graph-up me-1"></i>股票
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-category="favorites">
                    <i class="bi bi-star me-1"></i>收藏
                </button>
            </li>
        </ul>

        <main class="container-fluid px-3 py-3" style="padding-bottom: 80px;">
            <div id="news-list" class="row g-3">
                <div class="col-12 text-center py-5" id="loading">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-3 text-muted">載入中...</p>
                </div>
            </div>
        </main>

        <nav class="bottom-nav-custom fixed-bottom bg-dark border-top">
            <div class="container-fluid d-flex justify-content-around py-2">
                <button class="nav-btn active" data-page="home">
                    <i class="bi bi-house-fill"></i>
                    <span>首頁</span>
                </button>
                <button class="nav-btn" data-page="favorites">
                    <i class="bi bi-star-fill"></i>
                    <span>收藏</span>
                </button>
                <button class="nav-btn" data-page="settings">
                    <i class="bi bi-gear-fill"></i>
                    <span>設定</span>
                </button>
            </div>
        </nav>
    </div>

    <div class="modal fade" id="news-modal" tabindex="-1">
        <div class="modal-dialog modal-dialog-scrollable modal-lg">
            <div class="modal-content bg-dark-card">
                <div class="modal-header border-secondary">
                    <div>
                        <span id="modal-source" class="badge bg-primary mb-1"></span>
                        <span id="modal-date" class="text-muted small ms-2"></span>
                    </div>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <h5 id="modal-title" class="modal-title mb-3"></h5>
                    <div id="modal-body" class="text-break"></div>
                </div>
                <div class="modal-footer border-secondary">
                    <button id="btn-open-link" class="btn btn-outline-primary btn-sm">
                        <i class="bi bi-box-arrow-up-right me-1"></i>開啟原文
                    </button>
                    <button id="btn-toggle-favorite" class="btn btn-outline-warning btn-sm">
                        <i class="bi bi-star me-1"></i>收藏
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="settings-modal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark-card">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title"><i class="bi bi-gear me-2"></i>設定</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-4">
                        <h6 class="text-muted mb-3"><i class="bi bi-telegram me-2"></i>Telegram 設定</h6>
                        <div class="form-group mb-3">
                            <label class="form-label">Chat ID</label>
                            <div class="input-group">
                                <input type="text" id="setting-chat-id" class="form-control form-control-sm" placeholder="-1002133184985">
                                <button id="btn-save-chat-id" class="btn btn-outline-primary btn-sm">
                                    <i class="bi bi-check-lg"></i>
                                </button>
                            </div>
                            <small class="text-muted">更新後需重啟 Bot 生效</small>
                        </div>
                    </div>

                    <div class="mb-4">
                        <h6 class="text-muted mb-3"><i class="bi bi-bell me-2"></i>通知設定</h6>
                        <div class="form-check form-switch mb-2">
                            <input class="form-check-input" type="checkbox" id="setting-push" checked>
                            <label class="form-check-label" for="setting-push">開啟推送通知</label>
                        </div>
                        <div class="row g-2 mb-2">
                            <div class="col-6">
                                <label class="form-label small">安靜時段 (開始)</label>
                                <input type="time" id="setting-quiet-start" class="form-control form-control-sm" value="22:00">
                            </div>
                            <div class="col-6">
                                <label class="form-label small">安靜時段 (結束)</label>
                                <input type="time" id="setting-quiet-end" class="form-control form-control-sm" value="08:00">
                            </div>
                        </div>
                    </div>

                    <div>
                        <h6 class="text-muted mb-3"><i class="bi bi-display me-2"></i>顯示設定</h6>
                        <div class="form-group">
                            <label class="form-label">每頁顯示數量</label>
                            <select id="setting-per-page" class="form-select form-select-sm">
                                <option value="10">10 條</option>
                                <option value="20" selected>20 條</option>
                                <option value="50">50 條</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-secondary">
                    <button id="btn-save-settings" class="btn btn-primary w-100">
                        <i class="bi bi-check-lg me-2"></i>儲存設定
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="padding-bottom: 80px;">
        <div id="error-toast" class="toast toast-error" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header bg-danger text-white">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <strong class="me-auto">錯誤</strong>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body" id="error-toast-body"></div>
        </div>
        <div id="success-toast" class="toast toast-success" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header bg-success text-white">
                <i class="bi bi-check-circle-fill me-2"></i>
                <strong class="me-auto">成功</strong>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body" id="success-toast-body"></div>
        </div>
    </div>

    <div id="conflict-alert" class="conflict-alert d-none">
        <div class="conflict-alert-content">
            <i class="bi bi-exclamation-triangle-fill text-warning fs-3 mb-2"></i>
            <h5 class="mb-2">Conflict Error</h5>
            <p class="mb-3">Bot 狀態異常，請檢查系統設定</p>
            <button id="btn-dismiss-conflict" class="btn btn-outline-light btn-sm">確定</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js').catch(err => {
                console.log('SW registration failed:', err);
            });
        }

        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }

        let newsModal, settingsModal, errorToast, successToast;

        document.addEventListener('DOMContentLoaded', () => {
            newsModal = new bootstrap.Modal(document.getElementById('news-modal'));
            settingsModal = new bootstrap.Modal(document.getElementById('settings-modal'));
            errorToast = new bootstrap.Toast(document.getElementById('error-toast'));
            successToast = new bootstrap.Toast(document.getElementById('success-toast'));
        });
    </script>
</body>
</html>
